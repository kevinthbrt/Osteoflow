name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Create the GitHub release first so the parallel build jobs don't race
  # each other trying to create it (which caused a 422 "already_exists").
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create or reuse the GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — reusing it."
          else
            gh release create "$TAG" --title "$TAG" --notes "MyOsteoFlow $TAG"
          fi

  # Both platform jobs build with --publish never and hand their artifacts to
  # the final `publish` job instead of uploading to GitHub themselves. Each
  # used to call electron-builder with --publish always directly, but running
  # that concurrently on two runners against the same release tag raced
  # electron-builder's own "does this release exist yet" check and
  # intermittently failed with a 422 "already_exists" — even with the release
  # pre-created above. Uploading assets from a single job after both builds
  # finish removes the race entirely.
  build-mac:
    needs: create-release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Build Electron TypeScript
        run: npm run build:electron

      - name: Build Mac installer
        run: npx electron-builder --mac --arm64 --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload Mac build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dist
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/*.zip
            release/*.zip.blockmap
            release/latest-mac.yml
          if-no-files-found: error
          retention-days: 1

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Build Electron TypeScript
        run: npm run build:electron

      - name: Build Windows installer
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-dist
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: [create-release, build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Mac build artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-dist
          path: release

      - name: Download Windows build artifacts
        uses: actions/download-artifact@v4
        with:
          name: win-dist
          path: release

      - name: Upload all assets to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" release/* --clobber
